<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>http-tunnel setup</title>
  <style>body{font-family:system-ui,sans-serif;margin:0;background:#f6f7f9;color:#171717}.box{max-width:760px;margin:7vh auto;background:#fff;border:1px solid #ddd;border-radius:8px;padding:22px}h1{font-size:20px;margin:0 0 18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}input,select,button{font:inherit;box-sizing:border-box;width:100%;border-radius:6px;padding:9px}input,select{border:1px solid #bbb}button{margin-top:16px;border:1px solid #165dff;background:#165dff;color:#fff}.err{color:#a40000}</style>
</head>
<body>
  <main class="box"><h1>http-tunnel setup</h1><div class="grid"><label>Password<input id="password" type="password"></label><label>Confirm password<input id="confirm" type="password"></label><label>Domain<input id="domain" placeholder="example.com"></label><label>Public scheme<select id="scheme"><option>https</option><option>http</option></select></label><label>Listen address<input id="addr" value="0.0.0.0:8080"></label><label>Database URL<input id="db" value="sqlite://./data/http-tunnel.sqlite3"></label><label>Release repo<input id="repo" placeholder="owner/repo"></label></div><button id="init">Initialize</button><p id="err" class="err"></p></main>
  <script>init.onclick=async()=>{err.textContent="";const r=await fetch("/api/admin/setup/init",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({admin_password:password.value,confirm_password:confirm.value,domain:domain.value,public_scheme:scheme.value,addr:addr.value,database_url:db.value,release_repo:repo.value})});const j=await r.json();if(!r.ok){err.textContent=j.error?.message||"Setup failed";return}location.href="/admin/login"};</script>
</body>
</html>
